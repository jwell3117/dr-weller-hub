<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Weller's Offline Chart Phrase Builder</title>
<style>
:root{--bg:#f3f6fa;--card:#fff;--text:#172033;--muted:#64748b;--border:#d7e0ec;--blue:#275bd8;--blue2:#edf3ff;--green:#0f766e}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.head{max-width:1100px;margin:auto;padding:16px 20px}
h1{font-size:21px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}
.wrap{max-width:1100px;margin:20px auto;padding:0 18px}
.search{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:15px}
input,textarea,select{font:inherit}
#searchBox{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px}
.search-wrap{position:relative}
.search-results{position:absolute;left:0;right:0;top:48px;background:#fff;border:1px solid var(--border);
border-radius:10px;box-shadow:0 12px 28px rgba(30,55,90,.16);z-index:20;display:none;max-height:260px;overflow:auto}
.search-result{padding:10px 12px;border-bottom:1px solid #eef2f7;cursor:pointer;font-size:14px}
.search-result:last-child{border-bottom:0}.search-result:hover{background:var(--blue2);color:var(--blue)}
button{border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer}
.primary{background:var(--blue);color:#fff}.secondary{background:#e7ecf3}.copy{background:var(--green);color:#fff}
.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:17px;margin-bottom:13px}
.card h2{font-size:17px;margin:0 0 11px}.card h3{font-size:14px;margin:15px 0 7px}
.section{display:none}.section.active{display:block}
.phrases{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.phrase{padding:10px;border:1px solid var(--border);border-radius:9px;background:#fff;text-align:left;font-weight:400;line-height:1.3}
.phrase:hover{background:var(--blue2);border-color:#afc1f3}
textarea{width:100%;min-height:260px;padding:12px;border:1px solid var(--border);border-radius:9px;line-height:1.5;resize:vertical}
.output{position:sticky;top:88px}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.small{font-size:12px;color:var(--muted);line-height:1.4}
.nav{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.nav button{background:#fff;border:1px solid var(--border);padding:8px 10px}
.nav button:hover{background:var(--blue2)}
.lens textarea{min-height:150px}
@media(max-width:850px){.layout{grid-template-columns:1fr}.output{position:static}.phrases{grid-template-columns:1fr}.search{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="head"><h1>Dr. Weller's Offline Chart Phrase Builder</h1><div class="sub">Simple offline backup • click phrases, edit, copy, paste</div></div></header>
<div class="wrap">
  <div class="search">
    <div class="search-wrap">
      <input id="searchBox" placeholder="Search: myopia, dry eye, AMD, glaucoma, PVD..." oninput="searchDx(this.value)" onfocus="searchDx(this.value)" onkeydown="handleSearchKey(event)">
      <div id="searchResults" class="search-results"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="primary" onclick="openFirstMatch()">Search/Open</button>
      <button class="secondary" onclick="resetAll()">Reset</button>
    </div>
  </div>
  <div id="nav" class="nav"></div>

  <div class="layout">
    <main id="library"></main>
    <aside>
      <div class="card output">
        <h2>Chart Documentation</h2>
        <textarea id="chartOut" placeholder="Click phrases to assemble chart documentation."></textarea>
        <div class="actions">
          <button class="copy" onclick="copyText('chartOut','chartStatus')">Copy Chart Text</button>
          <button class="secondary" onclick="clearBox('chartOut')">Clear</button>
        </div>
        <div id="chartStatus" class="small"></div>
      </div>
      <div class="card lens">
        <h2>Lens Recommendations</h2>
        <textarea id="lensOut" placeholder="Click lens phrases to assemble the Rx printout."></textarea>
        <div class="actions">
          <button class="copy" onclick="copyText('lensOut','lensStatus')">Copy Lens Text</button>
          <button class="secondary" onclick="clearBox('lensOut')">Clear</button>
        </div>
        <div id="lensStatus" class="small"></div>
      </div>
    </aside>
  </div>
</div>

const library=document.getElementById('library');
const nav=document.getElementById('nav');

function build(){
 data.forEach((d,i)=>{
  const n=document.createElement('button');
  n.textContent=d.name;n.onclick=()=>show(d.id);nav.appendChild(n);
  const s=document.createElement('section');s.id=d.id;s.className='section'+(i===0?' active':'');
  const head=document.createElement('div');head.className='card';head.innerHTML='<h2>'+d.name+'</h2>';
  s.appendChild(head);
  d.groups.forEach(g=>{
   const c=document.createElement('div');c.className='card';
   const h=document.createElement('h3');h.textContent=g[0];c.appendChild(h);
   const p=document.createElement('div');p.className='phrases';
   g[1].forEach(item=>{
    const b=document.createElement('button');b.className='phrase';b.textContent=item[0];
    b.onclick=()=>addPhrase(item[0],item[1]);p.appendChild(b);
   });
   c.appendChild(p);s.appendChild(c);
  });
  library.appendChild(s);
 });
}
function show(id){document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active')}

function getMatches(){
 const q=document.getElementById('searchBox').value.toLowerCase().trim();
 return data.filter(d=>!q || d.name.toLowerCase().includes(q) || d.keys.includes(q));
}
function openFirstMatch(){
 const matches=getMatches();
 if(matches.length){
  show(matches[0].id);
  document.getElementById('searchResults').style.display='none';
 }
}
function handleSearchKey(e){
 if(e.key==='Enter'){
  e.preventDefault();
  openFirstMatch();
 }
}

function searchDx(q){
 const box=document.getElementById('searchResults');
 q=q.toLowerCase().trim();
 const matches=data.filter(d=>!q || d.name.toLowerCase().includes(q) || d.keys.includes(q));
 box.innerHTML='';
 matches.forEach(d=>{
  const item=document.createElement('div');
  item.className='search-result';
  item.textContent=d.name;
  item.onclick=()=>{
   show(d.id);
   document.getElementById('searchBox').value=d.name;
   box.style.display='none';
  };
  box.appendChild(item);
 });
 box.style.display=matches.length?'block':'none';
 if(matches.length===1 && q){
  show(matches[0].id);
 }
}
function addPhrase(text,target){
 const box=document.getElementById(target==='lens'?'lensOut':'chartOut');
 const sep=box.value.trim()?(target==='lens'?'\n\n':' '):'';
 box.value+=sep+text;
}
async function copyText(id,status){
 const box=document.getElementById(id);
 try{await navigator.clipboard.writeText(box.value)}catch(e){box.select();document.execCommand('copy')}
 document.getElementById(status).textContent='Copied.';
}
function clearBox(id){document.getElementById(id).value=''}
function resetAll(){
 clearBox('chartOut');
 clearBox('lensOut');
 document.getElementById('searchBox').value='';
 document.getElementById('searchResults').style.display='none';
 show(data[0].id);
}
document.addEventListener('click',e=>{
 if(!e.target.closest('.search-wrap')) document.getElementById('searchResults').style.display='none';
});
build();
